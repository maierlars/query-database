datasets:
  - hpe/use-case-2025

queries:
  enumerate_neighbors:
    query_file: enumerate_neighbors.aql
    options:
      optimizer:
        rules: ["-use-index-range"]
    invocations:
      simple_vertex:
        bind_param:
          v: "v/v100"
        options:
          force_one_shard_attribute: true
        result_check:
          method: unordered_eq
          result_file: enumerate_neighbors.result.jsonl